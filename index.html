<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SHS Feedback Wall</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="students.css">

</head>

<body>
<div class="container">

<h2>💬 SHS Feedback Wall</h2>

<label>Send feedback to:</label>
<select id="orgSelect">
<option>SSL</option>
<option>ASSETS</option>
<option>PRISM</option>
<option>SCHOLAE</option>
<option>CYSTEM</option>
<option>SKILS</option>
</select>

<label>Your feedback:</label>
<textarea id="msgText"></textarea>

<button onclick="sendFeedback()">Send Feedback 🚀</button>

<div class="success" id="successMsg">✅ Feedback sent successfully!</div>

<div class="preview" id="previewBox" style="display:none;"></div>

</div>

<script>
const STORAGE_KEY = "shsFeedback";

function sendFeedback(){
    const org = document.getElementById("orgSelect").value;
    const text = document.getElementById("msgText").value.trim();

    if(!text){
        alert("⚠️ Please type your feedback!");
        return;
    }

    const feedback = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

    const newEntry = {
        org,
        text,
        date: new Date().toLocaleString(),
        contact: "Anonymous"
    };

    feedback.push(newEntry);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(feedback));

    document.getElementById("successMsg").style.display = "block";

    const previewBox = document.getElementById("previewBox");
    const div = document.createElement("div");
    div.className = "message";
    div.innerHTML = `<b>To:</b> ${org}<br><b>Message:</b> ${text}<br><small>📅 ${newEntry.date}</small>`;
    
    previewBox.appendChild(div);
    previewBox.style.display = "block";

    previewBox.scrollTop = previewBox.scrollHeight;

    document.getElementById("msgText").value = "";

    setTimeout(()=>{
        document.getElementById("successMsg").style.display = "none";
    }, 3000);
}
</script>

</body>
</html>
