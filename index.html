<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SHS Feedback Wall</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="students.css">

</head>
<body>

<div class="top-logos">
  <img src="SSL.jpg" class="logo" data-org="SSL">
  <img src="ASSETS.jpg" class="logo" data-org="ASSETS">
  <img src="PRISM.jpg" class="logo" data-org="PRISM">
  <img src="SCHOLAE.jpg" class="logo" data-org="SCHOLAE">
  <img src="CYSTEM.jpg" class="logo" data-org="CYSTEM">
  <img src="SKILLS.jpg" class="logo" data-org="SKILS">
</div>

<div class="container">
<h2>💬 SHS Feedback Wall</h2>

<select id="orgSelect">
  <option value="SSL">SSL</option>
  <option value="ASSETS">ASSETS</option>
  <option value="PRISM">PRISM</option>
  <option value="SCHOLAE">SCHOLAE</option>
  <option value="CYSTEM">CYSTEM</option>
  <option value="SKILS">SKILS</option>
</select>

<textarea id="msgText" placeholder="Type your feedback..."></textarea>

<button onclick="sendFeedback()">Send Feedback 🚀</button>

<div class="success" id="successMsg">✅ Feedback sent successfully!</div>
</div>

<script>
const STORAGE_KEY = "shsFeedback";
const logoElements = document.querySelectorAll('.top-logos .logo');
const orgSelect = document.getElementById('orgSelect');

function highlightLogo(selectedOrg){
    logoElements.forEach(img=>{
        img.classList.toggle('active', img.dataset.org === selectedOrg);
    });
}

orgSelect.addEventListener('change', e=> highlightLogo(e.target.value));

function sendFeedback(){
  const org = orgSelect.value;
  const text = document.getElementById("msgText").value.trim();
  if(!text){ alert("⚠️ Please type your feedback!"); return; }

  const feedback = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
  feedback.push({ org, text, date:new Date().toLocaleString() });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(feedback));

  document.getElementById("msgText").value = "";
  document.getElementById("successMsg").style.display = "block";

  setTimeout(()=>{ document.getElementById("successMsg").style.display = "none"; }, 3000);

  highlightLogo(org);
}

highlightLogo(orgSelect.value);
</script>
</body>
</html>
