<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Admin Panel | Feedback Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="admin.css" />

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

</style>
</head>
<body>

<div class="top-logos">
  <img src="SSL.jpg" class="logo" data-org="SSL" alt="SSL" onerror="this.src='https://placehold.co/95x95?text=SSL'">
  <img src="ASSETS.jpg" class="logo" data-org="ASSETS" alt="ASSETS" onerror="this.src='https://placehold.co/95x95?text=ASSETS'">
  <img src="PRISM.jpg" class="logo" data-org="PRISM" alt="PRISM" onerror="this.src='https://placehold.co/95x95?text=PRISM'">
  <img src="SCHOLAE.jpg" class="logo" data-org="SCHOLAE" alt="SCHOLAE" onerror="this.src='https://placehold.co/95x95?text=SCHOLAE'">
  <img src="CYSTEM.jpg" class="logo" data-org="CYSTEM" alt="CYSTEM" onerror="this.src='https://placehold.co/95x95?text=CYSTEM'">
  <img src="SKILLS.jpg" class="logo" data-org="SKILS" alt="SKILS" onerror="this.src='https://placehold.co/95x95?text=SKILS'">
</div>

<div class="container">
<h2>🛠 Admin Panel</h2>

<select id="adminOrgSelect">
<option value="">-- Select Organization --</option>
<option value="SSL">SSL</option>
<option value="ASSETS">ASSETS</option>
<option value="PRISM">PRISM</option>
<option value="SCHOLAE">SCHOLAE</option>
<option value="CYSTEM">CYSTEM</option>
<option value="SKILS">SKILS</option>
</select>

<div class="password-wrapper">
  <input type="password" id="adminPass" placeholder="Enter organization password" />
  <span id="togglePass">👁️</span>
</div>

<button onclick="showAdmin()">🔓 View Feedback</button>

<div class="action-row">
  <button onclick="downloadPDF()">📄 Download PDF Report</button>
  <button onclick="showSummary()">📊 Summary</button>
</div>

<div id="adminMessages"></div>
</div>

<div id="summaryModal">
  <div class="modal-header-custom">
    <h3>📈 FEEDBACK SUMMARY</h3>
    <span id="closeModal">✖️</span>
  </div>
  <div id="modalContent"></div>
</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyCzy6G8bN908rcof72zMmiNxYfWb3l3KDo",
  authDomain: "shs-feedback-29a25.firebaseapp.com",
  databaseURL: "https://shs-feedback-29a25-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "shs-feedback-29a25",
  storageBucket: "shs-feedback-29a25.appspot.com",
  messagingSenderId: "549915426544",
  appId: "1:549915426544:web:9d19f938d7f84ac5104c35"
};

if (!firebase.apps.length) {
  firebase.initializeApp(firebaseConfig);
}
const db = firebase.database();
  
const ORG_PASSWORDS = { 
  "SSL": "ssl123",
  "ASSETS": "assets456", 
  "PRISM": "prism789",
  "SCHOLAE": "scholae101",
  "CYSTEM": "cystem202",
  "SKILS": "skils303"
};

const logoElements = document.querySelectorAll('.top-logos .logo');
let currentData = [];
let currentAuthorizedOrg = ""; 

function highlightLogo(selectedOrg) { 
  logoElements.forEach(img => { 
    img.classList.toggle('active', img.dataset.org === selectedOrg); 
  }); 
}

function showAdmin() {
  const org = document.getElementById("adminOrgSelect").value;
  const pass = document.getElementById("adminPass").value;
  
  if (!org) {
    alert("Select organization!");
    return;
  }
  
  if (pass !== ORG_PASSWORDS[org]) {
    alert("Wrong password!");
    return;
  }

  const box = document.getElementById("adminMessages");
  box.innerHTML = "<div class='empty'>⏳ Loading feedback...</div>";
  
  db.ref("feedbacks").once("value")
    .then(snapshot => {
      const data = snapshot.val() || {};
      const feedbackArray = Object.entries(data).map(([id, value]) => ({
        id: id,
        ...value
      }));
      
      currentData = feedbackArray.filter(f => f.org === org);
      currentAuthorizedOrg = org;
      displayMessages(currentData);
      highlightLogo(org);
      
   
      const modal = document.getElementById("summaryModal");
      if (modal) modal.style.display = "none";
    })
    .catch(error => {
      console.error("Firebase error:", error);
      document.getElementById("adminMessages").innerHTML = "<div class='empty'>⚠️ Error loading data. Check console.</div>";
      alert("Database error: " + error.message);
    });
}

function displayMessages(data) {
  const box = document.getElementById("adminMessages");
  box.innerHTML = "";
  
  if (!data || data.length === 0) { 
    box.innerHTML = "<div class='empty'>📭 No feedback yet</div>"; 
    return; 
  }
  
  data.forEach((fb, index) => {
    const messageDiv = document.createElement("div");
    messageDiv.className = "message";
    const safeText = (fb.text || "").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    const displayDate = fb.date ? new Date(fb.date).toLocaleString() : "No date";
    const contactInfo = fb.contact && fb.contact !== "Anonymous" ? fb.contact : "Anonymous";
    
    messageDiv.innerHTML = `
      <div class="message-content">
        <div class="message-text">💬 ${safeText}</div>
        <div class="message-meta">
          <span>📅 ${displayDate}</span>
          <span>📩 ${contactInfo}</span>
        </div>
        <button class="delete-btn" data-id="${fb.id}" data-index="${index}">🗑️ Delete</button>
      </div>
    `;
    
    const deleteBtn = messageDiv.querySelector('.delete-btn');
    deleteBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      const feedbackId = deleteBtn.getAttribute('data-id');
      if (confirm("Are you sure you want to delete this feedback permanently?")) {
        deleteFeedbackById(feedbackId);
      }
    });
    
    box.appendChild(messageDiv);
  });
}

function deleteFeedbackById(feedbackId) {
  if (!feedbackId) return;
  
  db.ref("feedbacks/" + feedbackId).remove()
    .then(() => {

      if (currentAuthorizedOrg) {
        db.ref("feedbacks").once("value")
          .then(snapshot => {
            const data = snapshot.val() || {};
            const feedbackArray = Object.entries(data).map(([id, value]) => ({
              id: id,
              ...value
            }));
            currentData = feedbackArray.filter(f => f.org === currentAuthorizedOrg);
            displayMessages(currentData);
          })
          .catch(err => console.error("Refresh error:", err));
      }
    })
    .catch(err => {
      alert("Delete failed: " + err.message);
    });
}

// Toggle password visibility
const toggle = document.getElementById("togglePass");
const passInput = document.getElementById("adminPass");
if (toggle) {
  toggle.addEventListener("click", () => { 
    if (passInput.type === "password") { 
      passInput.type = "text"; 
      toggle.textContent = "🙈"; 
    } else { 
      passInput.type = "password"; 
      toggle.textContent = "👁️"; 
    } 
  });
}

function downloadPDF() {
  if (currentData.length === 0) { 
    alert("No feedback to download! Please load feedback first using 'View Feedback'.");
    return; 
  }
  
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF('p', 'mm', 'a4');
  const org = currentAuthorizedOrg || document.getElementById("adminOrgSelect").value || "Organization";
  
  const pageWidth = doc.internal.pageSize.getWidth();
  const marginX = 15;
  let yPos = 25;
  
  doc.setFillColor(220, 70, 70);
  doc.rect(0, 0, pageWidth, 5, 'F');
  doc.setFontSize(24);
  doc.setTextColor(220, 70, 70);
  doc.setFont("helvetica", "bold");
  doc.text(org, pageWidth / 2, 28, { align: "center" });
  doc.setFontSize(11);
  doc.setTextColor(100, 100, 100);
  doc.setFont("helvetica", "normal");
  doc.text("FEEDBACK REPORT", pageWidth / 2, 39, { align: "center" });
  
  yPos = 46;
  doc.setDrawColor(220, 70, 70);
  doc.setLineWidth(0.5);
  doc.line(marginX, yPos, pageWidth - marginX, yPos);
  
  yPos += 10;
  doc.setFontSize(8);
  doc.setTextColor(100, 100, 100);
  doc.text("Generated: " + new Date().toLocaleString(), marginX, yPos);
  doc.text("Total Responses: " + currentData.length, pageWidth - marginX - 35, yPos);
  
  yPos += 14;
  
  const totalWords = currentData.reduce((sum, f) => sum + ((f.text || "").split(/\s+/).filter(w => w.length > 0).length), 0);
  const avgWords = currentData.length > 0 ? Math.round(totalWords / currentData.length) : 0;
  
  doc.setFillColor(248, 248, 250);
  doc.roundedRect(marginX, yPos, pageWidth - (marginX * 2), 30, 4, 4, 'F');
  doc.setDrawColor(220, 70, 70);
  doc.roundedRect(marginX, yPos, pageWidth - (marginX * 2), 30, 4, 4, 'S');
  doc.setFontSize(8);
  doc.setTextColor(220, 70, 70);
  doc.setFont("helvetica", "bold");
  doc.text("STATISTICS", marginX + 8, yPos + 6);
  doc.setFontSize(8);
  doc.setTextColor(80, 80, 80);
  doc.setFont("helvetica", "normal");
  doc.text("Total Words: " + totalWords, marginX + 8, yPos + 15);
  doc.text("Average Words: " + avgWords, marginX + 8, yPos + 22);
  const latestDate = currentData[currentData.length-1]?.date ? new Date(currentData[currentData.length-1].date).toLocaleDateString() : 'N/A';
  doc.text("Latest: " + latestDate, pageWidth - marginX - 45, yPos + 15);
  
  yPos += 40;

  const colX = { num: marginX + 4, date: marginX + 16, from: marginX + 52, message: marginX + 92 };
  
  doc.setFillColor(220, 70, 70);
  doc.roundedRect(marginX, yPos, pageWidth - (marginX * 2), 9, 3, 3, 'F');
  doc.setTextColor(255, 255, 255);
  doc.setFontSize(8);
  doc.setFont("helvetica", "bold");
  doc.text("No", colX.num, yPos + 6);
  doc.text("Date", colX.date, yPos + 6);
  doc.text("From", colX.from, yPos + 6);
  doc.text("Feedback Message", colX.message, yPos + 6);
  yPos += 9;

  doc.setTextColor(60, 60, 60);
  doc.setFont("helvetica", "normal");
  doc.setFontSize(8);
  
  for (let i = 0; i < currentData.length; i++) {
    const fb = currentData[i];
    const dateStr = fb.date ? new Date(fb.date).toLocaleDateString() : "No date";
    let fromStr = fb.contact && fb.contact !== "Anonymous" ? fb.contact : "Anonymous";
    if (fromStr.length > 22) fromStr = fromStr.substring(0, 19) + "...";
    
    const fullMessage = fb.text || "";
    const splitMsg = doc.splitTextToSize(fullMessage, 68);
    const rowHeight = 8 + (splitMsg.length - 1) * 4;
    
    if (yPos + rowHeight > 275) {
      doc.addPage();
      yPos = 25;
      doc.setFillColor(220, 70, 70);
      doc.roundedRect(marginX, yPos, pageWidth - (marginX * 2), 9, 3, 3, 'F');
      doc.setTextColor(255, 255, 255);
      doc.setFontSize(8);
      doc.setFont("helvetica", "bold");
      doc.text("No", colX.num, yPos + 6);
      doc.text("Date", colX.date, yPos + 6);
      doc.text("From", colX.from, yPos + 6);
      doc.text("Feedback Message", colX.message, yPos + 6);
      yPos += 9;
      doc.setTextColor(60, 60, 60);
      doc.setFont("helvetica", "normal");
      doc.setFontSize(8);
    }
    
    const rowColor = i % 2 === 0 ? [252, 252, 252] : [245, 245, 245];
    doc.setFillColor(...rowColor);
    doc.rect(marginX, yPos - 2, pageWidth - (marginX * 2), rowHeight, "F");
    
    doc.setTextColor(60, 60, 60);
    doc.text((i + 1).toString(), colX.num, yPos + 4);
    doc.text(dateStr, colX.date, yPos + 4);
    doc.text(fromStr, colX.from, yPos + 4);
    doc.text(splitMsg, colX.message, yPos + 4);
    
    yPos += rowHeight;
  }
  
  const pageCount = doc.internal.getNumberOfPages();
  for (let i = 1; i <= pageCount; i++) {
    doc.setPage(i);
    doc.setDrawColor(220, 70, 70);
    doc.setLineWidth(0.3);
    doc.line(marginX, 278, pageWidth - marginX, 278);
    doc.setFontSize(7);
    doc.setTextColor(130, 130, 130);
    doc.setFont("helvetica", "italic");
    doc.text("Page " + i + " of " + pageCount, pageWidth / 2, 285, { align: "center" });
    doc.text("SHS Feedback Report", pageWidth / 2, 291, { align: "center" });
  }
  
  doc.save(org + "_Feedback_Report.pdf");
}

function showSummary() {
 
  if (currentData.length === 0) { 
    showModalEnhanced(`
      <div class="empty-summary">📭 No feedback data available.<br>Please load organization feedback first using "View Feedback".</div>
    `);
    return; 
  }
  
  const total = currentData.length;
  let totalWords = 0;
  let wordFreq = {};
  
  currentData.forEach(f => {
    const words = (f.text || "").trim().toLowerCase().split(/\s+/).filter(w => w.length > 0);
    totalWords += words.length;
    words.forEach(w => {
      let clean = w.replace(/[^\w]/g, '');
      if (clean.length > 2 && !/^\d+$/.test(clean)) { 
        wordFreq[clean] = (wordFreq[clean] || 0) + 1; 
      }
    });
  });
  
  const avgWords = total === 0 ? 0 : Math.round(totalWords / total);
  const sortedKeywords = Object.entries(wordFreq).sort((a,b) => b[1] - a[1]).slice(0, 5);
  
  const latestThree = [...currentData].reverse().slice(0, 3);
  let latestHtml = '';
  latestThree.forEach((fb) => {
    let safeText = (fb.text || "").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    latestHtml += `
      <div class="feedback-entry">
        <div class="feedback-quote">💬 ${safeText}</div>
        <div class="feedback-meta-sm">
          📅 ${fb.date ? new Date(fb.date).toLocaleString() : "No date"} | 👤 ${fb.contact && fb.contact !== "Anonymous" ? fb.contact : "Anonymous"}
        </div>
      </div>
    `;
  });
  
  let keywordsHtml = '';
  if (sortedKeywords.length > 0) {
    keywordsHtml = `
      <div class="keyword-container">
        ${sortedKeywords.map(([kw, count]) => `<span class="keyword-badge">${kw} (${count})</span>`).join('')}
      </div>
    `;
  } else {
    keywordsHtml = `<div style="color:#ffaaaa; margin-top:5px;">— No significant keywords detected —</div>`;
  }
  
  const summaryHtml = `
    <div class="summary-card">
      <div class="summary-stat-item">
        <div class="stat-label-custom">📋 TOTAL RESPONSES</div>
        <div class="stat-value">${total}</div>
      </div>
      <div class="summary-stat-item">
        <div class="stat-label-custom">✍️ AVERAGE WORDS</div>
        <div class="stat-value">${avgWords}</div>
        <div class="stat-sub">from ${totalWords} total words</div>
      </div>
      <div class="summary-stat-item">
        <div class="stat-label-custom">🔑 TOP KEYWORDS</div>
        ${keywordsHtml}
      </div>
      <div class="summary-stat-item">
        <div class="stat-label-custom">🕒 LATEST FEEDBACK</div>
        <div class="latest-feedback-box">
          ${latestHtml || '<div style="padding: 10px; text-align:center;">✨ No recent feedback</div>'}
        </div>
      </div>
      <hr class="divider-light" />
      <div class="summary-footer">
        📍 ${currentAuthorizedOrg || document.getElementById("adminOrgSelect").value} · ${new Date().toLocaleString()}
      </div>
    </div>
  `;
  
  showModalEnhanced(summaryHtml);
}

function showModalEnhanced(contentHTML) {
  const modal = document.getElementById("summaryModal");
  const modalContentDiv = document.getElementById("modalContent");
  modalContentDiv.innerHTML = contentHTML;
  modal.style.display = "flex";
  modalContentDiv.scrollTop = 0;
}


document.getElementById("closeModal").addEventListener("click", () => {
  document.getElementById("summaryModal").style.display = "none";
});

window.addEventListener("click", (e) => { 
  const modal = document.getElementById("summaryModal"); 
  if (e.target === modal) modal.style.display = "none"; 
});


logoElements.forEach(logo => {
  logo.addEventListener("click", () => {
    const orgValue = logo.dataset.org;
    if (orgValue) {
      const selectEl = document.getElementById("adminOrgSelect");
      selectEl.value = orgValue;
      highlightLogo(orgValue);
    }
  });
});


window.addEventListener('load', function() {
  const modal = document.getElementById("summaryModal");
  if (modal) modal.style.display = "none";
 
});
</script>
</body>
</html>
